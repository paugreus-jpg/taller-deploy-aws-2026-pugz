name: Deploy to ECR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: taller-deploy-aws-2026-repository-rnez
  ACCOUNT_ID: 822414985516

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build application (JAR)
        run: mvn clean package -DskipTests

      # =========================
      # 🔐 AWS OIDC (SIN SECRETS)
      # =========================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::822414985516:role/taller-deploy-aws-2026-rol-rnez
          aws-region: ${{ env.AWS_REGION }}

      # =========================
      # 🔑 LOGIN ECR
      # =========================
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # =========================
      # 🐳 BUILD IMAGE
      # =========================
      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:latest .

      # =========================
      # 🏷️ TAG + PUSH
      # =========================
      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:latest $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push image to ECR
        run: |
          docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      # =========================
      # 📊 DEBUG
      # =========================
      - name: Show image info
        run: docker images